<!doctype html><html><head><meta charset="utf-8">
<title>ASCII Animation</title>
<style>body{background:#0b0b0b;color:#9f9;margin:0;display:flex;justify-content:center}
pre{font-family:'Courier New',monospace;font-size:18px;line-height:1.05;white-space:pre;letter-spacing:1px;background:#0b0b0b;padding:24px;border:1px solid #1f3f1f;border-radius:8px;margin-top:24px}</style></head><body><pre id="s"></pre>
<script>
var frames=[["  __   _  "," /  \\ ( ) "," |oo|  |  "," /||\\  |  ","  ||      ","          ","          "],
["          ","       _  ","  __  ( ) "," /  \\  |  "," |oo|  |  "," /||\\     ","          "],
["          ","       _  ","  __  ( ) "," /  \\  |  "," |oo|  |  "," /||\\     ","          "],
["          ","       _  ","  __  ( ) "," /  \\  |  "," |oo|  |  ","  \\\\||/   ","          "],
["          ","       _  ","  __  ( ) "," /  \\  |  "," |oo|  |  ","  \\\\||/   ","          "],
["          ","       _  ","  __  ( ) "," /  \\  |  "," |oo|  |  ","  \\\\||/   ","          "]];
var i=0;
function loop(){var f=frames[i%frames.length];document.getElementById('s').textContent=f.join('\n');i++;setTimeout(loop,166);}
loop();
</script></body></html>
